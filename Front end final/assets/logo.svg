<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="HelioSense AI Logo">
  <defs>
    <linearGradient id="sunGrad" x1="32" y1="4" x2="32" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fde047"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="32" y1="28" x2="32" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#334155"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <!-- Sun rays -->
  <g stroke="#facc15" stroke-width="2" stroke-linecap="round" opacity="0.85">
    <line x1="32" y1="2" x2="32" y2="8"/>
    <line x1="32" y1="2" x2="32" y2="8" transform="rotate(45 32 20)"/>
    <line x1="32" y1="2" x2="32" y2="8" transform="rotate(90 32 20)"/>
    <line x1="32" y1="2" x2="32" y2="8" transform="rotate(135 32 20)"/>
    <line x1="32" y1="2" x2="32" y2="8" transform="rotate(180 32 20)"/>
    <line x1="32" y1="2" x2="32" y2="8" transform="rotate(225 32 20)"/>
    <line x1="32" y1="2" x2="32" y2="8" transform="rotate(270 32 20)"/>
    <line x1="32" y1="2" x2="32" y2="8" transform="rotate(315 32 20)"/>
  </g>
  <!-- Sun -->
  <circle cx="32" cy="20" r="11" fill="url(#sunGrad)" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- Rooftop -->
  <path d="M8 38 L32 24 L56 38 L56 54 C56 56.2 54.2 58 52 58 H12 C9.8 58 8 56.2 8 54 Z" fill="url(#roofGrad)" stroke="#475569" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Solar panels on roof -->
  <rect x="18" y="40" width="10" height="6" rx="1" fill="#0ea5e9" opacity="0.7" stroke="#38bdf8" stroke-width="0.75"/>
  <rect x="30" y="40" width="10" height="6" rx="1" fill="#0ea5e9" opacity="0.7" stroke="#38bdf8" stroke-width="0.75"/>
  <rect x="42" y="40" width="10" height="6" rx="1" fill="#0ea5e9" opacity="0.7" stroke="#38bdf8" stroke-width="0.75"/>
  <!-- Energy bolt -->
  <path d="M34 46 L30 54 H33 L29 62 L37 50 H34 Z" fill="#facc15" stroke="#eab308" stroke-width="0.5" stroke-linejoin="round"/>
</svg>
